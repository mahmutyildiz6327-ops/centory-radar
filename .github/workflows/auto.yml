name: Auto Content Radar

on:
  schedule:
    - cron: "0 * * * *"  # her saat çalışır
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Repo çek
        uses: actions/checkout@v3

      - name: Python kur
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Kütüphaneleri kur
        run: |
          pip install requests pytrends

      - name: Script çalıştır
        run: python send_trends.py
